# fly.toml app configuration file generated for catchemall on 2023-07-05T00:38:15+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "catchemall"
primary_region = "cdg"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[env]
  LOCATION = "https://catchemall.fly.dev/"

[mounts]
source="caught_pokemon"
destination="/app/data"